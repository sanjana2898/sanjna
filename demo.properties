spring.application.name=demo
server.port=8086
#spring.datasource.url=jdbc:mysql://localhost:3307/nov9sql?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3307/nov9sql
spring.datasource.username=root
spring.datasource.password=1234
